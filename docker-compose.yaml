services:
  app:
    image: ${IMAGE_NAME}
    env_file: .env
    ports:
      - "3000:3000"
    restart: always
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17
    container_name: jobblitz_postgres
    environment:
      POSTGRES_DB: jobblitz
      POSTGRES_USER: jobblitz
      POSTGRES_PASSWORD: jobblitz
    ports:
      - "5432:5432"
    volumes:
      - ./db/data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jobblitz_redis
    restart: always

